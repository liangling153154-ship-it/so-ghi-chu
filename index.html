<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kho ghi chú</title>
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- Màn hình trạng thái: skeleton khi tải, chữ khi lỗi -->
  <div id="status-screen" class="status-screen">
    <div id="skeleton" class="skeleton" aria-hidden="true">
      <div class="sk-bar sk-header"></div>
      <div class="sk-chips">
        <div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div>
      </div>
      <div class="sk-bar sk-item"></div>
      <div class="sk-bar sk-item"></div>
      <div class="sk-bar sk-item"></div>
    </div>
    <div id="status-card" class="status-card" hidden>
      <div id="status-icon" class="status-icon">⏳</div>
      <p id="status-text">Đang mở kho ghi chú…</p>
    </div>
  </div>

  <!-- Màn hình chính -->
  <div id="app" class="app" hidden>
    <header class="app-header">
      <div class="app-header-inner">
        <span class="brand-mark" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="1" y="1" width="12" height="2.6" rx="1.3" fill="#fff"/>
            <rect x="1" y="5.7" width="12" height="2.6" rx="1.3" fill="#fff" opacity=".75"/>
            <rect x="1" y="10.4" width="8" height="2.6" rx="1.3" fill="#fff" opacity=".55"/>
          </svg>
        </span>
        <h1 id="space-name">…</h1>
        <span class="app-sub">Kho ghi chú</span>
      </div>
    </header>

    <nav id="category-bar" class="category-bar" aria-label="Phân loại"></nav>

    <main id="note-list" class="note-list"></main>

    <div id="empty-state" class="empty-state" hidden>
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" aria-hidden="true">
        <rect x="8" y="6" width="36" height="40" rx="6" fill="#f7f4f0"/>
        <rect x="15" y="15" width="16" height="4" rx="2" fill="#9a6a1f"/>
        <rect x="15" y="24" width="22" height="3.4" rx="1.7" fill="#e5e1da"/>
        <rect x="15" y="31" width="22" height="3.4" rx="1.7" fill="#e5e1da"/>
        <rect x="15" y="38" width="14" height="3.4" rx="1.7" fill="#e5e1da"/>
      </svg>
      <p>Chưa có ghi chú nào.<br>Bấm <strong>Thêm ghi chú</strong> để lưu mẫu tin nhắn, mã QR hay link đầu tiên.</p>
    </div>

    <button id="add-btn" class="fab">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      Thêm ghi chú
    </button>
  </div>

  <!-- Bottom sheet thêm / sửa ghi chú -->
  <dialog id="note-dialog" class="note-dialog">
    <div class="grabber" aria-hidden="true"></div>
    <form id="note-form" method="dialog">
      <h2 id="dialog-title">Thêm ghi chú</h2>

      <label>
        Tiêu đề <span class="req">*</span>
        <input type="text" id="f-title" required maxlength="200" placeholder="VD: QR chuyển khoản Sen's">
      </label>

      <label>
        Nội dung (để chép nhanh)
        <textarea id="f-content" rows="4" placeholder="VD: mẫu tin nhắn chào khách, số tài khoản, link web…"></textarea>
      </label>

      <label>
        Phân loại
        <input type="text" id="f-category" list="category-options" maxlength="50" placeholder="VD: Sen's Homestay, Hòa An…">
        <datalist id="category-options"></datalist>
      </label>

      <label class="file-label">
        Ảnh đính kèm
        <input type="file" id="f-image" accept="image/*">
      </label>
      <div id="image-preview-wrap" class="image-preview-wrap" hidden>
        <img id="image-preview" alt="Ảnh xem trước">
        <button type="button" id="remove-image-btn" class="btn-small btn-danger">Bỏ ảnh</button>
      </div>

      <div class="dialog-actions">
        <button type="button" id="cancel-btn" class="btn btn-ghost">Hủy</button>
        <button type="submit" id="save-btn" class="btn btn-primary">Lưu</button>
      </div>
    </form>
  </dialog>

  <!-- Xem ảnh phóng to -->
  <dialog id="lightbox" class="lightbox">
    <img id="lightbox-img" alt="Ảnh ghi chú">
    <div class="lightbox-actions">
      <button type="button" id="lightbox-copy" class="btn btn-primary">Chép ảnh</button>
      <a id="lightbox-download" class="btn btn-ghost" download target="_blank" rel="noopener">Tải ảnh</a>
      <button type="button" id="lightbox-close" class="btn btn-ghost">Đóng</button>
    </div>
  </dialog>

  <div id="toast" class="toast" hidden></div>

  <script>
    // Lưới an toàn: mọi lỗi JS đều hiện lên màn hình thay vì kẹt im lặng,
    // và nếu sau 12 giây vẫn chưa vào được app thì báo rõ cho người dùng.
    (function () {
      function report(msg) {
        var el = document.getElementById("status-text");
        var icon = document.getElementById("status-icon");
        var screen = document.getElementById("status-screen");
        var card = document.getElementById("status-card");
        var sk = document.getElementById("skeleton");
        if (el && screen && !screen.hidden) {
          if (sk) sk.hidden = true;
          if (card) card.hidden = false;
          if (icon) icon.textContent = "⚠️";
          el.innerHTML = "Có lỗi khi mở app:<br><small>" + msg + "</small><br>Hãy chụp màn hình này gửi người quản lý.";
        }
      }
      window.addEventListener("error", function (e) {
        report((e.message || "lỗi không rõ") + (e.filename ? "<br>" + e.filename.split("/").pop() + ":" + e.lineno : ""));
      });
      window.addEventListener("unhandledrejection", function (e) {
        report(e.reason && e.reason.message ? e.reason.message : "lỗi kết nối không rõ");
      });
      setTimeout(function () {
        var app = document.getElementById("app");
        var screen = document.getElementById("status-screen");
        if (app && app.hidden && screen && !screen.hidden) {
          report("mở quá lâu — mạng chậm hoặc bị chặn. Thử tắt hẳn trình duyệt rồi mở lại link.");
        }
      }, 12000);
    })();
  </script>
  <script src="/vendor/supabase.js"></script>
  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
